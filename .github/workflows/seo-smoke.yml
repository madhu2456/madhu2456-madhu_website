name: Live SEO Smoke Test

on:
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run SEO smoke test against production
        run: node scripts/seo-smoke-test.mjs
        env:
          SITE_URL: "https://madhudadi.in"
